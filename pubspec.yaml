name: coffeeguard
description: Coffee leaf disease detection app for Farmers, Admins, and Experts
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Backend
  supabase_flutter: ^2.8.0
  flutter_dotenv: ^5.2.1

  # Image + AI
  image_picker: ^1.2.1
  tflite_flutter: ^0.12.1
  image: ^4.7.2

  # Offline storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3

  # State management
  provider: ^6.1.2

  # UI
  google_fonts: ^6.3.3
  flutter_animate: ^4.5.0
  animated_text_kit: ^4.2.2

  # Charts
  fl_chart: ^0.66.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.2

  flutter_launcher_icons: ^0.13.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

  assets:
    - assets/models/coffee_leaf_verification.tflite
    - assets/models/coffee_rust_model.tflite
    - assets/icons/app_icon.png
    - .env

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/app_icon.png
  min_sdk_android: 21